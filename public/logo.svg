<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#logoGradient)"/>
  
  <!-- Glass effect overlay -->
  <circle cx="32" cy="32" r="32" fill="url(#glassGradient)"/>
  
  <!-- Border circle -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- D shape (left side - curved) -->
  <path d="M 18 20 L 26 20 Q 34 20 34 28 Q 34 32 34 32 Q 34 40 26 40 L 18 40 Z" fill="white" fill-opacity="0.95"/>
  
  <!-- O shape (right side - circle) -->
  <circle cx="44" cy="32" r="10" fill="none" stroke="white" stroke-width="2.5" fill-opacity="0.95"/>
  
  <!-- Small accent dots for "discovery" theme -->
  <circle cx="20" cy="18" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="48" cy="18" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="20" cy="46" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="48" cy="46" r="1.5" fill="rgba(255,255,255,0.7)"/>
</svg>
